  <title>Planche de BD Interactive</title>

  <style>
    /* ✅ Police locale Barlow */
    @font-face {
      font-family: 'Barlow';
      src: url('src/font/Barlow-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: auto;
      overflow-y: scroll;
      background: #ddd;
      font-family: sans-serif;
    }

    /* ✅ INTRO PLEIN ÉCRAN */
    .intro {
      font-family: 'Barlow', sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      font-size: 1.2em;
      z-index: 10;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .intro.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .credits {
      font-size: 0.7em;
      color: #666;
      text-align: center;
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-family: 'Barlow', sans-serif;
    }

    /* ✅ CONTENEUR PRINCIPAL */
    .container {
      padding-top: 100vh;
      overflow-x: auto;
    }

    /* ✅ PLANCHE DE BD */
    .planche-bd {
      width: 2180px;
      height: 2540px;
      padding: 15px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: repeat(6, 350px);
      grid-auto-rows: 350px;
      gap: 10px;
      background-color: #fff;
      border: 2px solid #444;
    }

    .vignette {
      background-color: #fafafa;
      border: 2px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: filter 0.3s ease;
      position: relative; /* nécessaire pour placer le numéro à l’intérieur */
    }

.vignette-number {
  position: absolute;
  bottom: 5px;
  right: 8px;
  font-size: 0.75em;
  font-family: 'Barlow', sans-serif;
  color: #333;
  background-color: rgb(255, 255, 255);
  padding: 2px 5px;
  border-radius: 4px;
}

    .vignette img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .normal { grid-column: span 1; grid-row: span 1; }
    .large  { grid-column: span 2; grid-row: span 1; }
    .long   { grid-column: span 1; grid-row: span 2; }

    .flou {
      filter: blur(10px);
      pointer-events: none;
    }

    .vide {
      border: none;
      background: transparent;
      pointer-events: none;
    }
  </style>
</head>

  <!-- ✅ SCRIPT -->
  <script>
    const intro = document.getElementById('intro');
    const container = document.getElementById('container');

    let hasScrolled = false;

    window.addEventListener('scroll', () => {
      if (!hasScrolled && (window.scrollX > 20 || window.scrollY > 20)) {
        hasScrolled = true;
        intro.classList.add('fade-out');

        // Supprimer l'intro après transition
        setTimeout(() => {
          intro.remove();
          container.style.paddingTop = '0';
          window.scrollTo(0, 0);
        }, 800); // correspond à la transition CSS
      }
    });

    // ✅ Affichage progressif des étapes selon ?step=...
    const params = new URLSearchParams(window.location.search);
    const step = parseInt(params.get('step'), 10);

    if (!isNaN(step)) {
      for (let i = 1; i <= step; i++) {
        document.querySelectorAll(`[data-step="${i}"]`).forEach(v => {
          v.classList.remove('flou');
        });
      }
    }
  </script>
